version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - insighflow-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env.docker
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/insighflow
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
      - sample_data:/app/sample_data
    depends_on:
      db:
        condition: service_healthy
    networks:
      - insighflow-network

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=insighflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - insighflow-network

  # Ollama for local LLM (optional - falls back to rule-based if unavailable)
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - insighflow-network
    profiles:
      - ai

networks:
  insighflow-network:
    driver: bridge

volumes:
  postgres_data:
  uploads_data:
  sample_data:
  ollama_data:
