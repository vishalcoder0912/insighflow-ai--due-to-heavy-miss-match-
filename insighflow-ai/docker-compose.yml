version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - insighflow-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/insighflow
      - SECRET_KEY=${SECRET_KEY:-supersecretkey123}
      - REFRESH_SECRET_KEY=${REFRESH_SECRET_KEY:-refreshsecretkey123}
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    depends_on:
      - db
    networks:
      - insighflow-network

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=insighflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - insighflow-network

networks:
  insighflow-network:
    driver: bridge

volumes:
  postgres_data:
  uploads_data:
